<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>project</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Mulish&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./layout/normalize.css">
	<link rel="stylesheet" href="./layout/style.css">
</head>
<body>
	<header class="header">
		<div class="container header__flex">
			<div>
				<a href="#">
					<img src="./image/svg/logo-h-f.svg" alt="logo-header">
				</a>
			</div>		
			<nav class="nav">
				<ul>
					<li class="nav__li">
						<a href="#" class="nav__link">Home</a>
					</li>
					<li class="nav__li">
						<a href="#" class="nav__link">Features</a>
					</li>
					<li class="nav__li">
						<a href="#" class="nav__link">Pricing</a>
					</li>
					<li class="nav__li">
						<a href="#" class="nav__link">Blog</a>
					</li>
				</ul>
			</nav>
			<div>
				<button class="button button__orange">
					Get Started
				</button>
			</div>
		</div>
	</header>

	<section class="container about">
		<div>
			<h1 class="about__title">Grow your subscription business</h1>
			<p class="about__text">
				Outcome-centered products that reduce churn, optimize pricing, and grow your subscription business end-to-end.
			</p>
			<div>
				<button class="button button__violete">Get Started</button>
				<button class="button button__transparent">Try</button>
			</div>
		</div>
		<div>
			<img src="./image/img-1.png" alt="img-1">
		</div>
	</section>

	<section class="container subscription">
		<div>
			<img src="./image/img-2.png" alt="img-2">
		</div>
		<div>
			<div>
				<h2 class="sub__title">Subscription index</h2>
			</div>
			<div>
				<input class="input__email"type="email" id="email" placeholder="Email">
				<button class="button button__violete">Try</button>
			</div>
		</div>
	</section>

	<footer class="footer">
		<div class="container footer__flex">
			<div>
				<a href="#">
					<img src="./image/svg/logo-h-f.svg" alt="logo-footer">
				</a>
			</div>
			<nav class="nav">
				<ul>
					<li class="nav__li">
						<a href="#" class="nav__link">Support</a></li>
					<li class="nav__li">
						<a href="#" class="nav__link">Premium</a></li>
					<li class="nav__li">
						<a href="#" class="nav__link">Pricing</a></li>
					<li class="nav__li">
						<a href="#" class="nav__link">Blog</a></li>
				</ul>
			</nav>
	</div>
	</footer>

	<script src="./scripts/app.js"></script>
</body>
</html>
